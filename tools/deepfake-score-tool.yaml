name: deepfake-score-tool
description: "Analyzes a WAV audio file to determine the deepfake risk score and classification."
parameters:
  type: object
  properties:
    file_path:
      type: string
      description: "Path to the WAV audio file for analysis."
  required:
    - file_path
returns:
  type: object
  properties:
    risk_score:
      type: number
      minimum: 0
      maximum: 100
      description: "Numerical risk score between 0 and 100."
    confidence:
      type: number
      minimum: 0
      maximum: 100
      description: "Confidence level of the verdict between 0 and 100."
    label:
      type: string
      enum:
        - AUTHENTIC
        - UNCERTAIN
        - DEEPFAKE
      description: "Final classification label of the audio."
    timestamp:
      type: string
      format: date-time
      description: "Timestamp of when the analysis was performed."
